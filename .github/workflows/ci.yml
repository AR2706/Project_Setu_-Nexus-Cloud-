name: Nexus CI Pipeline

# Trigger this workflow on every push to the main branch
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-assurance:
    name: Lint and Format Check
    runs-on: ubuntu-latest # GitHub gives you a free Linux VM!

    steps:
      # 1. Download your code into the VM
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20' # We use a modern, stable version of Node
          cache: 'npm'

      # 3. Install dependencies (Clean install)
      - name: Install Dependencies
        run: npm ci

      # 4. Run the Linter (If this fails, the whole pipeline turns Red ❌)
      - name: Run ESLint
        run: npm run lint
